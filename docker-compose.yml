services:
  app:
    build: .
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
    env_file: .env.local
    environment:
      NODE_ENV: production

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env.local
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
